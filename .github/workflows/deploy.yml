name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout personal blog
        uses: actions/checkout@v4
        with:
          path: sinton.github.io

      - name: Checkout theme
        uses: actions/checkout@v4
        with:
          repository: Sinton/MyBlog
          path: MyBlog

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.8.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: sinton.github.io/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: sinton.github.io
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: sinton.github.io
        run: pnpm build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: sinton.github.io/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
